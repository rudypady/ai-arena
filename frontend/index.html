<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Investment Arena – Simulácia</title>
  <meta name="description" content="Sleduj ako Gemini, GPT-4, Claude a Perplexity investujú virtuálnych 100€ na akciových a krypto trhoch.">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>AI Investment Arena</h1>
      <span>Simulácia · 4 AI agenti · €100 každý</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="status-dot" id="statusDot"></div>
    <span class="last-update" id="lastUpdate">Načítavam...</span>
    <button class="btn btn-secondary" id="btnUpdatePrices" onclick="updatePrices()">↻ Ceny</button>
    <button class="btn btn-primary" id="btnRunRound" onclick="runRound()">
      <span id="btnIcon">▶</span> Spustiť kolo
    </button>
  </div>
</header>

<main>
  <!-- Agent Cards -->
  <div class="agents-grid" id="agentsGrid">
    <!-- Generated by JS -->
  </div>

  <!-- Bottom: Chart + Trade Feed -->
  <div class="bottom-grid">
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">📈 Výkon portfólií</div>
          <div class="panel-sub">Vývoj hodnoty od začiatku simulácie</div>
        </div>
      </div>
      <div class="panel-body">
        <canvas id="performanceChart" height="220"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">⚡ Live obchody</div>
      </div>
      <div class="trade-feed" id="tradeFeed">
        <div class="empty-feed">Žiadne obchody zatiaľ.<br>Spusti prvé kolo!</div>
      </div>
    </div>
  </div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
